<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畢業專題口試簡報</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #ffffff;
            color: #0f172a;
            margin: 0;
            overflow: hidden;
        }

        .gradient-text {
            background: linear-gradient(to right, #2563eb, #0891b2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .media-container {
            background-color: #f8fafc;
            border: 2px solid #f1f5f9;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .media-container:hover {
            border-color: #3b82f6;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        .speaker-notes-panel {
            box-shadow: 0 -10px 40px -10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="w-full h-screen flex flex-col">

    <div class="w-full h-1.5 bg-slate-100 relative z-50">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-blue-600 to-cyan-400 transition-all duration-500 ease-out" style="width: 0%;"></div>
    </div>

    <main id="slide-content" class="flex-1 flex flex-col items-center justify-center p-12 relative w-full max-w-[1440px] mx-auto overflow-hidden">
        <!-- 內容由 JS 動態生成 -->
    </main>

    <div id="speaker-notes" class="hidden absolute bottom-24 left-1/2 transform -translate-x-1/2 w-3/4 max-w-4xl bg-white border-t-4 border-green-500 p-6 rounded-xl speaker-notes-panel z-50 animate-fade-in-up">
        <div class="flex items-center mb-3 border-b border-slate-100 pb-2">
            <i data-lucide="mic" class="w-5 h-5 text-green-500 mr-2"></i>
            <h3 class="text-green-600 font-bold text-lg">講稿提示 (Speaker Notes)</h3>
        </div>
        <p id="notes-text" class="text-slate-600 text-lg leading-relaxed"></p>
    </div>

    <footer class="h-24 border-t border-slate-100 bg-white/80 backdrop-blur-md flex items-center justify-between px-10 z-40">
        <div class="flex items-center text-slate-400 font-mono text-xs font-bold tracking-widest">
            <i data-lucide="cpu" class="w-4 h-4 mr-2 text-blue-500"></i> SYSTEM READY | ORAL DEFENSE 114
        </div>
        
        <div class="flex items-center gap-10">
            <button id="prev-btn" class="p-3 rounded-full hover:bg-blue-50 text-slate-400 hover:text-blue-600 disabled:opacity-20 transition-all">
                <i data-lucide="chevron-left" class="w-10 h-10"></i>
            </button>
            
            <div class="flex flex-col items-center min-w-[80px]">
                <span id="slide-counter" class="text-xl font-black text-slate-800">1 / 8</span>
                <div class="w-8 h-1 bg-blue-600 mt-1 rounded-full"></div>
            </div>
            
            <button id="next-btn" class="p-3 rounded-full hover:bg-blue-50 text-slate-400 hover:text-blue-600 disabled:opacity-20 transition-all">
                <i data-lucide="chevron-right" class="w-10 h-10"></i>
            </button>
        </div>

        <button id="toggle-notes" class="group px-6 py-3 rounded-xl flex items-center transition-all font-bold text-sm bg-slate-50 text-slate-500 hover:bg-blue-600 hover:text-white border border-slate-200 hover:border-blue-600">
            <i data-lucide="file-text" class="w-5 h-5 mr-2"></i>
            <span id="toggle-text">顯示講稿</span>
        </button>
    </footer>

    <script>
        const slidesData = [
            {
                id: 1,
                title: "基於雙目視覺與深度學習之<br><span class='gradient-text'>自主避障自走車</span>",
                subtitle: "114學年度 畢業專題 第一次口試報告",
                presenters: "指導教授：吳建興 教授 | 專題學生：游䕒翔、許蓁妮、吳芝妘",
                layout: "cover",
                icon: "monitor-play",
                mediaUrl: "1.jpg", 
                mediaType: "image",
                speakerNotes: "各位評審委員好，我們這組的專題題目是『基於雙目視覺與深度學習之自主避障自走車系統開發』。我們的核心目標是打造一台能在室內環境中，透過視覺與感測器達成自主避障的 AMR 小車。今天將針對目前第一階段『視覺感知大腦』與『離線決策系統』的開發成果進行報告。"
            },
            {
                id: 2,
                title: "系統開發架構與目前進度",
                bullets: [
                    "三大核心模組：感知 (Perception) ➔ 決策 (Planning) ➔ 控制 (Control)",
                    "今日報告重點：",
                    "破萬張資料管線建置",
                    "YOLOv8、YOLO11 模型訓練",
                    "Software-in-the-Loop 離線決策驗證"
                ],
                layout: "content-right-list",
                mediaUrl: "2.png", 
                mediaType: "image",
                speakerNotes: "這是我們整體的系統架構圖。自走車的開發分為感知、決策與控制三個層次。在第一次口試的階段，我們主要聚焦在前半段：建置高可靠度的資料管線、訓練極低延遲的 YOLO 感知大腦，並且在電腦端完成了『軟體端』的離線避障驗證。硬體整合則是我們下一階段的目標。"
            },
            {
                id: 3,
                title: "核心程式碼一：自動標註系統",
                bullets: [
                    "初階大腦：建立 YOLOv8 Baseline",
                    "自動標註：撰寫腳本批次推論",
                    "核心策略：人機協作 (HITL) 品管"
                ],
                layout: "split-images",
                mediaUrl: "3.png", 
                mediaUrl2: "4.jpg", 
                mediaType: "image",
                speakerNotes: "接著進入第一個核心程式碼：自動標註系統。如畫面上方三個重點，為了解決純人工標註的瓶頸，我們在 Colab T4 環境利用前 5,000 張圖訓練出 YOLOv8 初階大腦。接著，我們撰寫了自動化迴圈腳本，讓 AI 幫我們推論新影片並批次產生 txt 標註檔。最後透過『人機協作 (Human-in-the-loop)』進行 QA 校正，這套資料飛輪機制讓我們省下大量時間，順利將資料擴充到近萬張。"
            },
            {
                id: 4,
                title: "巨量資料工程與防錯機制",
                bullets: [
                    "總資料規模：高達 10000 多張訓練圖片",
                    "協作防碰撞：開發自動化前綴腳本，避免多人協作時檔名衝突與覆寫"
                ],
                layout: "stacked-images",
                mediaUrl: "5.png", 
                mediaUrl2: "6.png", 
                mediaType: "image",
                speakerNotes: "為了處理組員間的資料整合，我們寫了自動化命名腳本防止檔案覆蓋。"
            },
            {
                id: 5,
                title: "核心程式碼二：最終大腦訓練系統",
                bullets: [
                    "架構躍升：導入最新 YOLO11 與 A100 算力",
                    "平行榨能：Batch Size 128 / Workers 8",
                    "I/O 突破：7.7GB 影像全載入快取 (cache=True)"
                ],
                layout: "content-right-image",
                mediaUrl: "7.png", 
                mediaType: "image",
                speakerNotes: "第二個核心程式碼是我們的最終訓練系統。當資料量擴充到破萬張時，我們將模型升級到了最新的 YOLO11。為了解決龐大圖庫帶來的訓練瓶頸，我們租用了 A100 頂級 GPU，並設定 Batch Size 為 128 進行高度平行化。最關鍵的是，我們開啟了 cache=True，把高達 7.7GB 的圖檔全數塞進記憶體，完美避開了硬碟的 I/O 延遲，讓模型不到一小時就完成了收斂。"
            },
            {
                id: 6,
                title: "模型評估與極致精準度",
                bullets: [
                    "核心指標：mAP@50 達 0.994",
                    "危險障礙物：Precision / Recall > 99%",
                    "環境泛化：具備極強抗雜訊能力"
                ],
                layout: "split-images",
                mediaUrl: "8.png", 
                mediaUrl2: "9.png", 
                mediaType: "image",
                speakerNotes: "這是我們最終拿到的成績單。畫面上只列了三個最核心的數據：第一，我們的 mAP@50 達到了 0.994。第二，從右邊的混淆矩陣可以看到，針對最容易發生碰撞的柱子和垃圾桶，精準率與召回率都超過了 99%。這代表模型已經具備了極強的環境泛化能力，這雙『眼睛』已經完全具備了實戰水準。"
            },
            {
                id: 7,
                title: "軟體迴路驗證 (SIL) 與決策狀態機",
                bullets: [
                    "單目測距：建立虛擬危險深度線",
                    "狀態機決策：即時輸出轉向/煞車指令",
                    "極致效能：系統總延遲 < 45ms"
                ],
                layout: "video-center",
                mediaUrl: "10.mp4", 
                mediaType: "video",
                speakerNotes: "有了模型後，我們不能直接放上車子，否則稍有差錯車子會直接撞毀。因此我們用 Python 寫了一套離線測試模擬器。如同展示影片，我們結合單目深度估算，畫出了一條紅色的危險深度線。當障礙物觸發這條線，Rule-based 狀態機就會立刻介入，精準算出要左轉還是煞車，且整體運算延遲壓在 45 毫秒內。"
            },
            {
                id: 8,
                title: "現有架構限制與下一階段擴充",
                bullets: [
                    "邊緣案例：純白牆壁之視覺盲區",
                    "感測器融合：導入 LiDAR 光達測距",
                    "下階目標：車載開發板實機部署"
                ],
                layout: "split-images",
                mediaUrl: "11.png", 
                mediaUrl2: "12.JPG", 
                mediaType: "image",
                speakerNotes: "在開發過程中我們發現一個限制：如果只依賴單一顆鏡頭，當車子遇到完全沒有特徵的『純白牆壁』時，視覺測距會失效導致撞牆。為了解決這個視覺盲區，我們下一階段的解法是『感測器融合』。如右圖所示，目前已經在電腦端成功打通了 LiDAR 光達的底層通訊。接下來的目標就是將 YOLO 視覺與光達幾何測距整合，正式部署到車載開發板上進行實測。"
            }
        ];

        let currentSlide = 0;
        let showNotes = false;

        const slideContent = document.getElementById('slide-content');
        const slideCounter = document.getElementById('slide-counter');
        const progressBar = document.getElementById('progress-bar');
        const notesArea = document.getElementById('speaker-notes');
        const notesText = document.getElementById('notes-text');
        const toggleBtn = document.getElementById('toggle-notes');
        const toggleText = document.getElementById('toggle-text');

        function renderMedia(url, type, placeholderText = "請填入媒體路徑", customClass = "") {
            if (!url) {
                return `
                    <div class="media-container w-full h-full min-h-[250px] rounded-3xl flex flex-col items-center justify-center text-slate-300 border-dashed border-2 border-slate-200">
                        <i data-lucide="${type === 'video' ? 'video' : 'image'}" class="w-12 h-12 mb-3 opacity-20"></i>
                        <p class="text-xs font-bold uppercase tracking-widest opacity-40">${placeholderText}</p>
                    </div>
                `;
            }
            if (type === 'video') {
                return `<video src="${url}" controls autoplay loop muted class="w-full h-full rounded-3xl object-cover shadow-2xl ${customClass}"></video>`;
            }
            return `<img src="${url}" class="w-full h-full rounded-3xl object-contain shadow-xl ${customClass}" />`;
        }

        function updateSlide() {
            const data = slidesData[currentSlide];
            let html = "";

            slideCounter.innerText = `${currentSlide + 1} / ${slidesData.length}`;
            progressBar.style.width = `${((currentSlide + 1) / slidesData.length) * 100}%`;
            notesText.innerText = data.speakerNotes;

            if (data.layout === "cover") {
                html = `
                    <div class="text-center max-w-5xl animate-fade-in-up">
                        <div class="w-24 h-24 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-blue-200">
                            <i data-lucide="${data.icon}" class="w-12 h-12 text-white"></i>
                        </div>
                        <h1 class="text-7xl font-black mb-8 leading-[1.2] text-slate-900">${data.title}</h1>
                        <h2 class="text-3xl text-slate-400 font-medium mb-12 tracking-wide">${data.subtitle}</h2>
                        <div class="inline-flex items-center px-8 py-4 rounded-2xl bg-slate-50 border border-slate-100 text-slate-500 font-bold text-lg mb-10">
                            ${data.presenters}
                        </div>
                        <div class="w-full h-64 mt-4">${renderMedia(data.mediaUrl, data.mediaType, "背景裝飾圖插槽")}</div>
                    </div>
                `;
            } else if (data.layout === "content-right-list") {
                // 🌟 第二頁專屬：保留層次感，底下清單改用閃電圖示
                html = `
                    <div class="w-full h-full flex flex-col animate-fade-in-up">
                        <h2 class="text-5xl font-black mb-12 flex items-center">
                            <span class="w-3 h-12 bg-blue-600 mr-6 rounded-full"></span> ${data.title}
                        </h2>
                        <div class="grid grid-cols-2 gap-16 flex-1">
                            <div class="flex flex-col justify-center">
                                <div class="space-y-4">
                                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm mb-6">
                                        <div class="flex items-start">
                                            <i data-lucide="layers" class="w-8 h-8 text-blue-500 mr-4 flex-shrink-0 mt-1"></i>
                                            <span class="text-2xl font-bold text-slate-700 leading-relaxed">${data.bullets[0]}</span>
                                        </div>
                                    </div>
                                    <h3 class="text-2xl font-black text-slate-800 mt-8 mb-6 border-l-4 border-blue-500 pl-4 py-1">${data.bullets[1]}</h3>
                                    <div class="pl-2 space-y-5">
                                        ${data.bullets.slice(2).map(b => `
                                            <div class="flex items-center text-2xl font-medium text-slate-600">
                                                <!-- 🔥 這裡把打勾換成了藍色閃電 (zap) -->
                                                <i data-lucide="zap" class="w-7 h-7 text-blue-500 mr-4 flex-shrink-0"></i>
                                                <span class="leading-relaxed">${b}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                            <div class="h-[550px]">${renderMedia(data.mediaUrl, data.mediaType, "主展示圖插槽")}</div>
                        </div>
                    </div>
                `;
            } else if (data.layout === "content-right-image") {
                // 🔥 第五頁專屬：閃電卡片版型
                html = `
                    <div class="w-full h-full flex flex-col animate-fade-in-up">
                        <h2 class="text-5xl font-black mb-12 flex items-center">
                            <span class="w-3 h-12 bg-blue-600 mr-6 rounded-full"></span> ${data.title}
                        </h2>
                        <div class="grid grid-cols-2 gap-16 flex-1">
                            <div class="flex flex-col justify-center gap-8">
                                ${data.bullets.map(b => `
                                    <div class="bg-slate-50 px-8 py-6 rounded-2xl border border-slate-100 shadow-sm flex items-center hover:border-blue-400 hover:shadow-md transition-all group">
                                        <i data-lucide="zap" class="w-8 h-8 text-blue-500 flex-shrink-0 mr-6 group-hover:scale-110 transition-transform"></i>
                                        <span class="font-bold text-slate-700 text-2xl leading-snug">${b.replace('✅ ', '')}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="h-[550px]">${renderMedia(data.mediaUrl, data.mediaType, "主展示圖插槽")}</div>
                        </div>
                    </div>
                `;
            } else if (data.layout === "split-images") {
                html = `
                    <div class="w-full h-full flex flex-col animate-fade-in-up">
                        <h2 class="text-5xl font-black mb-8 flex items-center">
                            <span class="w-3 h-12 bg-cyan-500 mr-6 rounded-full"></span> ${data.title}
                        </h2>
                        <div class="w-full grid grid-cols-3 gap-6 mb-8">
                            ${data.bullets.map(b => `
                                <div class="bg-slate-50 px-6 py-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-center text-center hover:border-cyan-400 hover:shadow-md transition-all">
                                    <span class="font-bold text-slate-600 text-lg leading-snug">${b}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="grid grid-cols-2 gap-10 flex-1 min-h-[350px]">
                            ${renderMedia(data.mediaUrl, data.mediaType, "對照圖 A")}
                            ${renderMedia(data.mediaUrl2, data.mediaType, "對照圖 B")}
                        </div>
                    </div>
                `;
            } else if (data.layout === "stacked-images") {
                html = `
                    <div class="w-full h-full flex flex-col animate-fade-in-up">
                         <h2 class="text-5xl font-black mb-12 flex items-center">
                            <span class="w-3 h-12 bg-indigo-500 mr-6 rounded-full"></span> ${data.title}
                        </h2>
                        <div class="grid grid-cols-12 gap-12 flex-1">
                            <div class="col-span-5 flex flex-col justify-center">
                                <ul class="space-y-8">
                                    ${data.bullets.map(b => `<li class="text-2xl font-bold text-slate-600 leading-relaxed border-l-4 border-slate-100 pl-6 hover:border-indigo-500 transition-all">${b}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="col-span-7 flex flex-col gap-8">
                                <div class="h-1/2">${renderMedia(data.mediaUrl, data.mediaType, "資源圖 A")}</div>
                                <div class="h-1/2">${renderMedia(data.mediaUrl2, data.mediaType, "資源圖 B")}</div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (data.layout === "video-center") {
                html = `
                    <div class="w-full h-full flex flex-col items-center animate-fade-in-up">
                        <h2 class="text-5xl font-black mb-8 w-full text-left flex items-center">
                             <span class="w-3 h-12 bg-red-500 mr-6 rounded-full"></span> ${data.title}
                        </h2>
                        <div class="w-full grid grid-cols-3 gap-6 mb-8">
                            ${data.bullets.map(b => `
                                <div class="bg-slate-50 px-6 py-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-center text-center hover:border-red-400 hover:shadow-md transition-all">
                                    <span class="font-bold text-slate-600 text-lg leading-snug">${b}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="w-full max-w-6xl flex-1 rounded-3xl overflow-hidden ring-8 ring-slate-50">
                            ${renderMedia(data.mediaUrl, data.mediaType, "🔥 核心影片插槽 (.mp4)")}
                        </div>
                    </div>
                `;
            }

            slideContent.innerHTML = html;
            lucide.createIcons();
            
            document.getElementById('prev-btn').disabled = currentSlide === 0;
            document.getElementById('next-btn').disabled = currentSlide === slidesData.length - 1;
        }

        function next() { if (currentSlide < slidesData.length - 1) { currentSlide++; updateSlide(); } }
        function prev() { if (currentSlide > 0) { currentSlide--; updateSlide(); } }
        
        document.getElementById('next-btn').onclick = next;
        document.getElementById('prev-btn').onclick = prev;
        
        toggleBtn.onclick = () => {
            showNotes = !showNotes;
            notesArea.classList.toggle('hidden');
            if(showNotes) {
                toggleBtn.classList.add('bg-blue-600', 'text-white');
                toggleText.innerText = '隱藏講稿';
            } else {
                toggleBtn.classList.remove('bg-blue-600', 'text-white');
                toggleText.innerText = '顯示講稿';
            }
        };

        window.onkeydown = (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') next();
            if (e.key === 'ArrowLeft') prev();
        };

        updateSlide();
    </script>
</body>
</html>
